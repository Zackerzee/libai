<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="时里白造物拼豆图纸打印上传页，上传图片或 PDF 后由店员确认打印。" />
    <title>拼豆图纸打印｜时里白造物</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        --red: #e95b5b;
        --yellow: #f7c85c;
        --green: #7bcb77;
        --blue: #5b8def;
        --ink: #24211f;
        --muted: #766e66;
        --bg: #fff8f1;
        --card: #ffffff;
        --line: #f0e3d8;
        --soft: #fff0e9;
        --shadow: 0 10px 30px rgba(70, 40, 20, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 10% 0%, rgba(247, 200, 92, 0.24), transparent 30%),
          radial-gradient(circle at 90% 8%, rgba(91, 141, 239, 0.18), transparent 28%),
          linear-gradient(180deg, #fffaf5 0%, var(--bg) 100%);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      }

      .page {
        max-width: 560px;
        margin: 0 auto;
        padding: 22px 16px 42px;
      }

      .hero,
      .card {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--card);
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 22px 18px;
        background: linear-gradient(135deg, #ffffff 0%, #fff4e8 65%, #f8fbff 100%);
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
      }

      .hero p,
      .muted {
        color: var(--muted);
        line-height: 1.65;
      }

      .card {
        margin-top: 14px;
        padding: 18px;
      }

      label {
        display: grid;
        gap: 8px;
        margin-top: 14px;
        font-weight: 800;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 13px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      .upload-box {
        display: grid;
        gap: 8px;
        border: 1.5px dashed var(--red);
        border-radius: 20px;
        padding: 18px;
        background: #fff7f7;
        color: #5e554c;
        text-align: center;
        cursor: pointer;
      }

      .upload-box strong {
        color: var(--ink);
      }

      .file-input {
        display: none;
      }

      .file-list {
        display: grid;
        gap: 8px;
        margin: 12px 0 0;
        padding: 0;
        list-style: none;
      }

      .file-list li {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 10px 12px;
        background: #fffaf5;
        color: #5e554c;
        font-size: 13px;
        line-height: 1.5;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 14px 16px;
        background: var(--red);
        color: #ffffff;
        cursor: pointer;
        font-size: 16px;
        font-weight: 900;
      }

      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .status {
        min-height: 22px;
        margin: 12px 0 0;
        color: #8a4b14;
        font-size: 14px;
        line-height: 1.6;
      }

      .success {
        display: none;
        margin-top: 14px;
        border: 1px solid rgba(123, 203, 119, 0.45);
        border-radius: 20px;
        padding: 16px;
        background: #f5fff4;
        line-height: 1.7;
      }

      .success.is-visible {
        display: block;
      }

      .order-no {
        color: var(--red);
        font-size: 20px;
        font-weight: 950;
      }

      .notes {
        margin: 14px 0 0;
        padding-left: 20px;
        color: var(--muted);
        line-height: 1.75;
      }

      .top-link {
        display: inline-block;
        margin-bottom: 12px;
        color: #8a4b14;
        font-size: 13px;
        text-decoration: none;
      }
    </style>
    <script src="/print/app.js?v=20260705-1" defer></script>
  </head>
  <body>
    <main class="page">
      <a class="top-link" href="/nfc">返回门店服务页</a>
      <section class="hero">
        <h1>拼豆图纸打印</h1>
        <p>
          上传你的拼豆图纸，店员确认后即可打印。<br />
          为避免图纸模糊、比例错误或格式错乱，所有图纸需由店员确认后再打印。
        </p>
      </section>

      <section class="card" aria-labelledby="print-form-title">
        <h2 id="print-form-title">提交图纸</h2>
        <form id="printForm">
          <label for="fileInput">
            上传图纸
            <span class="upload-box">
              <strong>请上传拼豆图纸图片或 PDF</strong>
              <span>支持 JPG / PNG / PDF，单个文件不超过 20MB</span>
              <span>不支持 DOC / ZIP / RAR / HEIC / MP4 等格式</span>
            </span>
          </label>
          <input id="fileInput" class="file-input" name="files" type="file" accept=".jpg,.jpeg,.png,.pdf,image/jpeg,image/png,application/pdf" multiple />
          <ul id="fileList" class="file-list"></ul>

          <label for="contactInput">
            微信昵称或手机号
            <input id="contactInput" name="contact" type="text" maxlength="80" placeholder="方便店员确认图纸" required />
          </label>

          <label for="noteInput">
            备注，可选
            <textarea id="noteInput" name="note" maxlength="300" placeholder="例如：需要横版、图纸要清晰、不要缩放、帮我看一下是否适合打印等。"></textarea>
          </label>

          <button id="submitButton" class="btn" type="submit">提交图纸</button>
          <p id="statusText" class="status" role="status" aria-live="polite"></p>
        </form>

        <div id="successBox" class="success" aria-live="polite">
          <strong>图纸已提交成功</strong><br />
          订单号：<span id="orderNo" class="order-no"></span><br />
          请凭订单号到收银台联系店员。<br />
          店员确认图纸清晰度和打印效果后，再为你打印。
        </div>
      </section>

      <section class="card">
        <h2>打印说明</h2>
        <ol class="notes">
          <li>请上传清晰的拼豆图纸图片或 PDF。</li>
          <li>上传后请凭订单号到收银台联系店员。</li>
          <li>店员会先确认图纸清晰度和打印效果，再为你打印。</li>
          <li>如图纸比例不合适或图片模糊，可能需要重新上传。</li>
          <li>为保护隐私，上传的图纸将在 7 天后自动清理。</li>
        </ol>
      </section>
    </main>
  </body>
</html>
