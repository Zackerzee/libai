<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>拼豆桌台时间锚点看板</title>
    <link rel="stylesheet" href="/mentor-timer-anchor/timer-board.css?v=20260711-preview-1" />
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <div>
          <p class="kicker">LIBMS TIMER V2</p>
          <h1>时里白造物桌台计时看板</h1>
          <p id="modeHint" class="mode-hint">正在连接计时后端...</p>
        </div>
        <button id="statsButton" type="button">查看统计</button>
      </header>

      <section id="tableGrid" class="grid" aria-live="polite"></section>
    </main>

    <dialog id="statsModal" class="modal">
      <div class="modal-head">
        <h2>桌台状态统计</h2>
        <button id="closeStatsButton" type="button">关闭</button>
      </div>
      <div id="statsContent" class="stats-content"></div>
    </dialog>

    <script src="/mentor-timer-anchor/timer-board.js?v=20260711-preview-1" type="module"></script>
  </body>
</html>
