<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="时里白造物评价小助手，随机生成评价参考文案，方便用户根据真实体验修改后发布。"
    />
    <title>时里白造物评价小助手</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./review-helper.css?v=20260629-1" />
    <script src="./review-helper.js?v=20260629-2" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <section class="review-card" aria-labelledby="page-title">
        <h1 id="page-title">时里白造物评价小助手</h1>
        <p class="tip">
          不知道怎么写评价？<br />
          点一下随机生成一条评价参考，复制后可以根据自己的真实体验稍微修改～
        </p>

        <div id="review" class="review-box" tabindex="0" aria-live="polite">
          点击下方按钮，随机生成一条评价。
        </div>

        <div class="actions">
          <button class="generate" id="generate-review-button" type="button">随机生成评价</button>
          <button class="copy" id="copy-review-button" type="button">复制评价内容</button>
        </div>

        <p class="status" id="copy-status" role="status" aria-live="polite"></p>

        <p class="small">
          建议加上你的作品照片一起发布哦～<br />
          你的评价对我们小店真的很重要 ♡
        </p>
      </section>
    </main>
  </body>
</html>
